name: Build Extension Zip

permissions:
  contents: read

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/extension-zip.yml'
      - 'packages/extension/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'

jobs:
  build-extension-zip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build extension zip
        run: pnpm --filter @boss-ai/extension zip

      - name: Upload extension zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: boss-ai-extension-chrome-zip
          path: packages/extension/.output/*.zip
          retention-days: 14
          if-no-files-found: error
          include-hidden-files: true
